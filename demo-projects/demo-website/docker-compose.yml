name: demo-website

services:
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - "8888:3001"
    depends_on:
      - backend
