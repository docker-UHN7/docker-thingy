<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h1>Todo MVP</h1>
      <p class="subtitle">
        nginx (static UI + reverse proxy) &rarr; Express API &rarr; Postgres, with Redis as a
        read-through cache. Data source for the last list load: <span id="source">-</span>
      </p>

      <form id="add-form">
        <input id="title-input" type="text" placeholder="What needs doing?" required />
        <button type="submit">Add</button>
      </form>

      <ul id="task-list"></ul>
    </main>

    <script src="app.js"></script>
  </body>
</html>
