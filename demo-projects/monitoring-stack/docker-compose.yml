services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitornet

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sample-app-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitornet

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - monitornet

  sample-app:
    build:
      context: ./sample-app
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
    networks:
      - monitornet

  # Continuously hits sample-app so the dashboard shows live traffic from the
  # moment the stack starts, instead of a flat line until someone curls it.
  load-generator:
    image: curlimages/curl:latest
    command: ["sh", "-c", "while true; do curl -s http://sample-app:8090/ > /dev/null; sleep 1; done"]
    depends_on:
      - sample-app
    networks:
      - monitornet

networks:
  monitornet:

volumes:
  prometheus-data:
  grafana-data:
