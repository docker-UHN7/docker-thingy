<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self';
        connect-src 'self' ws: wss: http: https:;
        object-src 'none';
        base-uri 'none';
        frame-src 'none';
      "
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docker Project Explorer</title>
    <link rel="icon" type="image/svg+xml" href="<%= require('../resources/icons/favicon.svg') %>" />
    <link rel="icon" type="image/png" href="<%= require('../resources/icons/favicon-96.png') %>" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
